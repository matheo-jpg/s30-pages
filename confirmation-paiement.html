<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E9FCFF">
<title>Bienvenue - Stratégie 30%</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #E9FCFF;
  color: #1a1a2e;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}
:root {
  --accent: #1BA7FF;
  --cyan-border: rgba(135, 205, 221, 0.8);
  --glow-color: rgb(142, 214, 234);
  --text-muted: #4a5568;
}
.highlight { color: var(--accent); }

.content { text-align: center; padding: 40px 20px; }

.check-circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #16a34a;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
  box-shadow: 0 4px 24px rgba(22, 163, 74, 0.3);
}
.check-circle svg { width: 40px; height: 40px; }

h1 { font-size: 36px; font-weight: 900; line-height: 1.25; margin-bottom: 12px; }
.divider { width: 40%; height: 2px; background: var(--cyan-border); margin: 0 auto 24px; }
.subtitle { font-size: 17px; color: var(--text-muted); line-height: 1.7; }

.ellipse-glow {
  position: fixed; bottom: -300px; right: -400px;
  width: 1100px; height: 600px; border-radius: 50%;
  background-color: var(--glow-color);
  box-shadow: 0 0 100px rgba(170,245,253,1), 0 0 200px rgba(170,245,253,0.9), 0 0 400px rgba(170,245,253,0.7), 0 0 800px rgba(170,245,253,0.5);
  z-index: -1; pointer-events: none;
}

@media (max-width: 768px) {
  h1 { font-size: 26px; }
  .subtitle { font-size: 15px; }
  .check-circle { width: 68px; height: 68px; margin-bottom: 22px; }
  .check-circle svg { width: 34px; height: 34px; }
  .ellipse-glow { width: 900px; height: 800px; transform: translate(53%, 85%); }
}
</style>
</head>
<body>

<div class="ellipse-glow"></div>

<div class="content">
  <div class="check-circle">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Merci pour ta <span class="highlight">confiance.</span></h1>
  <div class="divider"></div>
  <p class="subtitle">Ton paiement a bien été reçu.</p>
</div>

</body>
</html>

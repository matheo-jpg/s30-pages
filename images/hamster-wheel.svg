<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa" rx="16"/>

  <!-- Wheel -->
  <circle cx="200" cy="140" r="90" fill="none" stroke="#e0e0e0" stroke-width="6"/>
  <circle cx="200" cy="140" r="70" fill="none" stroke="#e0e0e0" stroke-width="3"/>

  <!-- Spokes -->
  <line x1="200" y1="50" x2="200" y2="230" stroke="#e0e0e0" stroke-width="2.5"/>
  <line x1="110" y1="140" x2="290" y2="140" stroke="#e0e0e0" stroke-width="2.5"/>
  <line x1="136" y1="76" x2="264" y2="204" stroke="#e0e0e0" stroke-width="2.5"/>
  <line x1="264" y1="76" x2="136" y2="204" stroke="#e0e0e0" stroke-width="2.5"/>

  <!-- Stand -->
  <line x1="200" y1="230" x2="140" y2="270" stroke="#ccc" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="230" x2="260" y2="270" stroke="#ccc" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="270" x2="270" y2="270" stroke="#ccc" stroke-width="4" stroke-linecap="round"/>

  <!-- Hamster body -->
  <ellipse cx="210" cy="150" rx="28" ry="22" fill="#f4a460"/>

  <!-- Hamster head -->
  <circle cx="235" cy="138" r="16" fill="#f4a460"/>

  <!-- Ear -->
  <circle cx="244" cy="125" r="7" fill="#deb887"/>
  <circle cx="244" cy="125" r="4" fill="#f5cba7"/>

  <!-- Eye -->
  <circle cx="242" cy="135" r="3" fill="#333"/>
  <circle cx="243" cy="134" r="1" fill="#fff"/>

  <!-- Nose -->
  <circle cx="250" cy="140" r="2" fill="#c0392b"/>

  <!-- Legs running -->
  <ellipse cx="195" cy="168" rx="8" ry="5" fill="#deb887" transform="rotate(-20 195 168)"/>
  <ellipse cx="220" cy="170" rx="8" ry="5" fill="#deb887" transform="rotate(15 220 170)"/>

  <!-- Tail -->
  <path d="M182 148 Q170 140 175 130" fill="none" stroke="#f4a460" stroke-width="3" stroke-linecap="round"/>

  <!-- Motion lines -->
  <path d="M155 105 L140 95" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
  <path d="M150 130 L132 128" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
  <path d="M160 160 L142 165" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
</svg>
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cover Affiliation — S30%</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 30px;
            font-family: sans-serif;
        }
        canvas { display: block; }
        .download-btn {
            padding: 16px 40px;
            background: #fff;
            color: #0a0e1a;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .download-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <canvas id="cover" width="2560" height="1440"></canvas>
    <button class="download-btn" onclick="downloadPNG()">Télécharger en PNG</button>

    <script>
        // Use high-res canvas (2x) for sharp export, display at 1280x720
        const canvas = document.getElementById('cover');
        canvas.style.width = '1280px';
        canvas.style.height = '720px';

        // Load multiple font weights
        Promise.all([
            new FontFace('MainFont', 'url(https://fonts.gstatic.com/s/bebasneue/v14/JTUSjIg69CK48gW7PXoo9Wlhyw.woff2)').load(),
            new FontFace('SubFont', 'url(https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfAZ9hjQ.woff2)').load()
        ]).then(function(fonts) {
            fonts.forEach(f => document.fonts.add(f));
            draw();
        }).catch(function() {
            // Fallback: draw anyway
            draw();
        });

        function draw() {
            const ctx = canvas.getContext('2d');
            const W = 2560;
            const H = 1440;
            const S = 2; // scale factor

            // === BACKGROUND ===
            const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 900);
            bgGrad.addColorStop(0, 'rgb(18, 28, 55)');
            bgGrad.addColorStop(0.5, 'rgb(11, 18, 38)');
            bgGrad.addColorStop(1, 'rgb(6, 11, 24)');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            // === GRID (very subtle) ===
            ctx.strokeStyle = 'rgba(25, 35, 60, 0.15)';
            ctx.lineWidth = 1;
            const gridSize = 120; // 60px * 2 (scale)
            for (let x = 0; x <= W; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y <= H; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // === TOP TEXT: "STRATEGIE 30%" ===
            ctx.save();
            ctx.font = (14*S) + 'px "SubFont", "Inter", sans-serif';
            ctx.fillStyle = 'rgba(67, 97, 238, 0.5)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('S T R A T E G I E   3 0 %', W/2, 490);
            ctx.restore();

            // === MAIN TEXT: "AFFILIATION" ===
            ctx.save();
            ctx.translate(W/2, H/2 - 10);
            ctx.transform(1, 0, -0.1, 1, 0, 0); // italic skew

            // Try sizes to fit nicely
            const fontSize = 280;
            ctx.font = fontSize + 'px "MainFont", "Bebas Neue", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('AFFILIATION', 0, 0);
            ctx.restore();

            // === DIVIDER LINE ===
            const divY = H/2 + 165;
            ctx.strokeStyle = 'rgb(86, 70, 220)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(W/2 - 50, divY);
            ctx.lineTo(W/2 + 50, divY);
            ctx.stroke();

            // === BOTTOM TEXT ===
            ctx.save();
            ctx.font = (14*S) + 'px "SubFont", "Inter", sans-serif';
            ctx.fillStyle = 'rgb(67, 97, 238)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('G A G N E   5 0 0 €   P A R   V E N T E', W/2, divY + 55);
            ctx.restore();
        }

        function downloadPNG() {
            // Export at 1280x720
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = 1280;
            exportCanvas.height = 720;
            const ectx = exportCanvas.getContext('2d');
            ectx.drawImage(canvas, 0, 0, 1280, 720);

            const link = document.createElement('a');
            link.download = 'v6-affiliation.png';
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
